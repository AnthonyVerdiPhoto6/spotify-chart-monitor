name: Spotify Chart Monitor

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: spotify-chart-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run Spotify monitor
        env:
          SPOTIFY_SP_DC: ${{ secrets.SPOTIFY_SP_DC }}
          SPOTIFY_SP_KEY: ${{ secrets.SPOTIFY_SP_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

          PUBLIC_CHART_URL: "https://charts.spotify.com/charts/overview/global"

          NOTIFY_ON_FIRST_RUN: "false"
          DISCORD_PING_EVERYONE: "false"

        run: python scripts/check_spotify.py

      - name: Upload debug artifacts if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotify-debug
          path: debug/
          if-no-files-found: ignore

      - name: Commit updated state
        if: success()
        run: |
          git config user.name "spotify-chart-monitor"
          git config user.email "actions@github.com"

          if [[ -n "$(git status --porcelain data/state.json)" ]]; then
            git add data/state.json
            git commit -m "Update Spotify monitor state"
            git push
          else
            echo "No state changes to commit."
          fi
