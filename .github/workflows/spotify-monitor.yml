name: Spotify Chart Monitor

on:
  schedule:
    # Starter attempts during a broad UTC window.
    # Python decides whether to actually monitor based on Eastern time.
    - cron: "7,22,37,52 10-21 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: spotify-chart-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Spotify monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTIFY_ON_FIRST_RUN: "false"
          DISCORD_PING_EVERYONE: "false"

          # Keep each GitHub job below the 6-hour hard limit.
          MAX_SESSION_SECONDS: "19800"

        run: python scripts/check_spotify.py

      - name: Commit updated state
        if: success()
        run: |
          git config user.name "spotify-chart-monitor"
          git config user.email "actions@github.com"

          if [[ -n "$(git status --porcelain data/state.json)" ]]; then
            git add data/state.json
            git commit -m "Update Spotify monitor state"
            git push
          else
            echo "No state changes to commit."
          fi
